<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>AMA/MER Kalkyl Pro</title>
<!-- PWA -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#4f46e5">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Kalkyl Pro">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
/* ═══ CSS VARIABLES ══════════════════════════════════════════ */
:root {
  --p:#4f46e5;--pd:#3730a3;--pl:#eef2ff;--ps:#c7d2fe;--pi:#818cf8;
  --a:#f59e0b;--s:#10b981;--d:#ef4444;--i:#06b6d4;--o:#f97316;--v:#8b5cf6;
  --bg:#f1f5f9;--sf:#fff;--sa:#f8fafc;--sb:#f1f5f9;
  --tx:#0f172a;--ts:#475569;--tm:#94a3b8;
  --bd:#e2e8f0;--bds:#cbd5e1;
  --sh:0 1px 3px rgba(0,0,0,.07),0 4px 12px rgba(0,0,0,.04);
  --sh2:0 8px 28px rgba(79,70,229,.18);
  --r:16px;--rs:10px;--rss:8px;
  --tr:all .2s cubic-bezier(.4,0,.2,1);
  --sw:268px;
  --ct:#475569;--cg:rgba(100,116,139,.08);
}
[data-theme=dark]{
  --bg:#060d1a;--sf:#0f1929;--sa:#111e30;--sb:#0b1420;
  --tx:#e2e8f0;--ts:#94a3b8;--tm:#475569;
  --bd:#1e2d44;--bds:#2d3f57;--pl:#1a1e40;--ps:#252a5c;--pi:#6366f1;
  --sh:0 1px 3px rgba(0,0,0,.4),0 4px 12px rgba(0,0,0,.25);
  --sh2:0 8px 28px rgba(79,70,229,.3);
  --ct:#94a3b8;--cg:rgba(148,163,184,.06);
}
/* ═══ RESET ════════════════════════════════════════════════════ */
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--tx);line-height:1.6;font-size:14px;overflow-x:hidden;transition:background .3s,color .3s}
a{color:inherit;text-decoration:none}
/* ═══ LAYOUT ═══════════════════════════════════════════════════ */
.app{display:flex;min-height:100vh}
/* ═══ SIDEBAR ════════════════════════════════════════════════════ */
.side{
  width:var(--sw);min-height:100vh;position:fixed;top:0;left:0;
  background:linear-gradient(175deg,#1a1040 0%,#1e1b4b 30%,#1e2d5c 70%,#163050 100%);
  color:#fff;z-index:200;display:flex;flex-direction:column;
  transition:transform .3s cubic-bezier(.4,0,.2,1);overflow-y:auto;overflow-x:hidden;
}
.side-logo{padding:18px 14px 12px;border-bottom:1px solid rgba(255,255,255,.08);display:flex;align-items:center;gap:10px;flex-shrink:0}
.side-logo .ico{font-size:22px;filter:drop-shadow(0 2px 4px rgba(0,0,0,.3))}
.side-logo h1{font-size:13px;font-weight:800;line-height:1.2;letter-spacing:-.2px}
.side-logo .sub{font-size:9px;opacity:.45;font-weight:400;margin-top:1px}
.side-scroll{flex:1;overflow-y:auto;padding:8px 8px 12px}
.nav-sec{font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:rgba(255,255,255,.3);padding:10px 8px 4px;margin-top:4px}
.ni{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:8px;cursor:pointer;transition:var(--tr);margin-bottom:1px;font-size:12px;color:rgba(255,255,255,.6);font-weight:500;position:relative}
.ni:hover{background:rgba(255,255,255,.09);color:#fff}
.ni.a{background:rgba(255,255,255,.14);color:#fff;font-weight:700;box-shadow:inset 0 0 0 1px rgba(255,255,255,.1)}
.ni .badge{margin-left:auto;background:rgba(255,255,255,.14);border-radius:20px;padding:1px 6px;font-size:9px;font-weight:600}
.ni.a .badge{background:rgba(255,255,255,.25)}
.proj-divider{height:1px;background:rgba(255,255,255,.07);margin:8px 8px}
/* Project list in sidebar */
.proj-chip{display:flex;align-items:center;gap:7px;padding:7px 10px;border-radius:8px;cursor:pointer;transition:var(--tr);margin-bottom:2px;font-size:11px;color:rgba(255,255,255,.5);font-weight:500}
.proj-chip:hover{background:rgba(255,255,255,.07);color:rgba(255,255,255,.85)}
.proj-chip.cur{background:rgba(255,255,255,.12);color:#fff;font-weight:700}
.proj-chip .dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.proj-add{display:flex;align-items:center;gap:7px;padding:6px 10px;border-radius:8px;cursor:pointer;border:1px dashed rgba(255,255,255,.2);color:rgba(255,255,255,.4);font-size:11px;transition:var(--tr);margin-top:4px;justify-content:center}
.proj-add:hover{border-color:rgba(255,255,255,.4);color:rgba(255,255,255,.75);background:rgba(255,255,255,.05)}
/* Sidebar footer */
.side-foot{padding:10px 8px;border-top:1px solid rgba(255,255,255,.07);flex-shrink:0}
.lang-row{display:flex;gap:4px;margin-bottom:6px}
.lang-btn{flex:1;padding:5px;border-radius:6px;border:1px solid rgba(255,255,255,.12);background:0;color:rgba(255,255,255,.45);cursor:pointer;font-size:10px;font-family:inherit;transition:var(--tr);font-weight:600}
.lang-btn.a{background:rgba(255,255,255,.14);color:#fff;border-color:rgba(255,255,255,.25)}
.theme-btn{width:100%;padding:7px;border-radius:6px;border:1px solid rgba(255,255,255,.1);background:0;color:rgba(255,255,255,.5);cursor:pointer;font-size:11px;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:5px;transition:var(--tr)}
.theme-btn:hover{background:rgba(255,255,255,.07);color:#fff}
/* ═══ MAIN ═══════════════════════════════════════════════════════ */
.main{margin-left:var(--sw);flex:1;padding:24px 28px 60px;min-width:0;max-width:1200px}
/* ═══ HAMBURGER ════════════════════════════════════════════════ */
.hamburger{display:none;position:fixed;top:12px;left:12px;z-index:300;background:var(--p);color:#fff;border:none;border-radius:10px;width:42px;height:42px;cursor:pointer;font-size:18px;align-items:center;justify-content:center;box-shadow:var(--sh2)}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:150;backdrop-filter:blur(3px)}
/* ═══ PAGE HEADER ═════════════════════════════════════════════ */
.ph{margin-bottom:20px}
.ph h2{font-size:22px;font-weight:800;margin-bottom:4px;background:linear-gradient(135deg,var(--p),var(--i));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.ph .sub{color:var(--ts);font-size:13px}
/* ═══ CARD ═════════════════════════════════════════════════════ */
.cd{background:var(--sf);border-radius:var(--r);padding:18px;border:1px solid var(--bd);margin-bottom:14px;box-shadow:var(--sh);transition:border-color .2s,box-shadow .2s}
.cd:hover{box-shadow:var(--sh2);border-color:var(--ps)}
.ct{font-size:10px;font-weight:700;color:var(--tm);margin-bottom:12px;text-transform:uppercase;letter-spacing:.7px;display:flex;align-items:center;gap:6px}
.ct .dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
/* ═══ INFO BOX ════════════════════════════════════════════════ */
.infobox{background:var(--pl);border:1px solid var(--ps);border-radius:var(--rs);padding:14px 16px;margin-bottom:14px;font-size:12.5px;color:var(--pd);line-height:1.7}
[data-theme=dark] .infobox{background:#1a1e40;border-color:#252a5c;color:#a5b4fc}
.infobox h4{font-size:13px;font-weight:700;margin-bottom:6px;display:flex;align-items:center;gap:6px}
.infobox ul{padding-left:16px;margin-top:4px}.infobox ul li{margin-bottom:3px}
/* ═══ METRIC GRID ════════════════════════════════════════════ */
.mg{display:grid;grid-template-columns:repeat(auto-fill,minmax(128px,1fr));gap:10px;margin-bottom:14px}
.mc{background:var(--sf);border:1px solid var(--bd);border-radius:var(--rs);padding:14px 12px;position:relative;overflow:hidden;box-shadow:var(--sh);transition:var(--tr)}
.mc::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--p),var(--i))}
.mc.c2::before{background:linear-gradient(90deg,var(--a),var(--o))}
.mc.c3::before{background:linear-gradient(90deg,var(--i),var(--s))}
.mc.c4::before{background:linear-gradient(90deg,var(--s),var(--p))}
.mc.c5::before{background:linear-gradient(90deg,var(--o),var(--a))}
.mc.c6::before{background:linear-gradient(90deg,var(--v),var(--p))}
.mc:hover{transform:translateY(-2px);box-shadow:var(--sh2)}
.mc .v{font-size:21px;font-weight:800;color:var(--p);line-height:1;margin-bottom:3px}
.mc.c2 .v{color:var(--a)}.mc.c3 .v{color:var(--i)}.mc.c4 .v{color:var(--s)}.mc.c5 .v{color:var(--o)}.mc.c6 .v{color:var(--v)}
.mc .lbl{font-size:10px;color:var(--tm);font-weight:600;text-transform:uppercase;letter-spacing:.3px}
.mc .un{font-size:10px;color:var(--ts);margin-top:1px}
.mc .br{margin-top:8px;height:3px;background:var(--bd);border-radius:2px;overflow:hidden}
.mc .bf{height:100%;border-radius:2px;background:linear-gradient(90deg,var(--p),var(--i));transition:width .7s cubic-bezier(.4,0,.2,1)}
.mc.c2 .bf{background:linear-gradient(90deg,var(--a),var(--o))}
.mc.c3 .bf{background:linear-gradient(90deg,var(--i),var(--s))}
.mc.c4 .bf{background:linear-gradient(90deg,var(--s),var(--p))}
/* ═══ FORM ════════════════════════════════════════════════════ */
.fg{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:8px}
.fi{display:flex;flex-direction:column;gap:3px}
.fi label{font-size:10px;font-weight:600;color:var(--tm);letter-spacing:.2px;display:flex;align-items:center;gap:4px}
.fi input,.fi select{width:100%;padding:7px 10px;border:1.5px solid var(--bd);border-radius:var(--rss);font-size:12px;background:var(--sf);color:var(--tx);transition:var(--tr);font-family:inherit}
.fi input:focus,.fi select:focus{outline:0;border-color:var(--p);box-shadow:0 0 0 3px rgba(79,70,229,.12)}
.fi input:hover,.fi select:hover{border-color:var(--bds)}
/* ═══ BUTTONS ═════════════════════════════════════════════════ */
.btn{padding:8px 16px;border-radius:var(--rss);border:0;font-size:12px;font-weight:600;cursor:pointer;transition:var(--tr);display:inline-flex;align-items:center;gap:6px;font-family:inherit}
.bp{background:var(--p);color:#fff}.bp:hover{background:var(--pd);transform:translateY(-1px);box-shadow:0 4px 12px rgba(79,70,229,.3)}
.bs{background:var(--sa);color:var(--tx);border:1.5px solid var(--bd)}.bs:hover{border-color:var(--bds);background:var(--sb)}
.bd-btn{background:rgba(239,68,68,.1);color:var(--d);padding:3px 8px;font-size:10px;border-radius:4px;border:0;cursor:pointer;transition:var(--tr)}.bd-btn:hover{background:rgba(239,68,68,.2)}
.btn-row{display:flex;gap:6px;flex-wrap:wrap;margin-top:10px}
/* ═══ TABLE ═══════════════════════════════════════════════════ */
.tbl-wrap{overflow-x:auto;border-radius:var(--rs);border:1px solid var(--bd)}
.dt{width:100%;border-collapse:collapse;font-size:11px}
.dt th{background:linear-gradient(135deg,var(--p),var(--pd));color:#fff;padding:8px 6px;text-align:center;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;white-space:nowrap}
.dt td{padding:4px 3px;text-align:center;border-bottom:1px solid var(--bd);vertical-align:middle}
.dt input{width:100%;padding:5px 4px;border:1px solid var(--bd);border-radius:4px;text-align:center;font-size:11px;background:var(--sf);color:var(--tx);font-family:inherit}
.dt input:focus{border-color:var(--p);outline:none;box-shadow:0 0 0 2px rgba(79,70,229,.1)}
.dt tbody tr{cursor:pointer;transition:background .15s}
.dt tbody tr:hover{background:var(--pl)}
.dt tbody tr.done-row{background:rgba(16,185,129,.07)}
[data-theme=dark] .dt tbody tr.done-row{background:rgba(16,185,129,.12)}
.dt tbody tr.sel-row{background:var(--pl);outline:2px solid var(--p);outline-offset:-2px}
[data-theme=dark] .dt tbody tr.sel-row{background:#1a1e40}
.dt .num{font-weight:700;color:var(--p)}.dt .num.bad{color:var(--d)}.dt .num.warn{color:var(--a)}
.dt tfoot td{background:var(--pl);font-weight:800;font-size:12px}
[data-theme=dark] .dt tfoot td{background:#1a1e40}
/* ═══ CHARTS ══════════════════════════════════════════════════ */
.ch-wrap{position:relative;height:220px}
.ch-wrap.sm{height:170px}.ch-wrap.lg{height:280px}
.cg2{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px}
.cg3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:14px}
/* ═══ PROGRESS ════════════════════════════════════════════════ */
.prog-bar{height:8px;background:var(--bd);border-radius:4px;overflow:hidden;margin:6px 0}
.prog-fill{height:100%;border-radius:4px;background:linear-gradient(90deg,var(--s),#34d399);transition:width .7s ease}
.prog-row{display:flex;align-items:center;justify-content:space-between;font-size:11px;margin-bottom:4px}
.prog-row .pct{font-weight:700;color:var(--s)}
/* ═══ SVG BOX ═════════════════════════════════════════════════ */
.svg-box{display:flex;justify-content:center;align-items:center;padding:8px 0;min-height:180px}
/* ═══ TOAST ════════════════════════════════════════════════════ */
.toast{position:fixed;bottom:80px;right:20px;background:var(--tx);color:var(--bg);padding:10px 18px;border-radius:10px;font-size:12px;box-shadow:0 8px 24px rgba(0,0,0,.2);z-index:9999;display:none;font-weight:600}
@keyframes slideUp{from{transform:translateY(12px);opacity:0}to{transform:translateY(0);opacity:1}}
/* ═══ HERO ════════════════════════════════════════════════════ */
.hero{background:linear-gradient(135deg,#1e1b4b 0%,#312e81 50%,#1e40af 100%);border-radius:var(--r);padding:32px 28px;color:#fff;margin-bottom:20px;position:relative;overflow:hidden}
.hero::after{content:'';position:absolute;right:-50px;top:-50px;width:220px;height:220px;border-radius:50%;background:rgba(255,255,255,.04)}
.hero h1{font-size:26px;font-weight:800;margin-bottom:8px}
.hero p{opacity:.8;font-size:13.5px;max-width:520px;line-height:1.7}
.hero .tags{display:flex;gap:6px;margin-top:14px;flex-wrap:wrap}
.hero .tag{background:rgba(255,255,255,.14);border:1px solid rgba(255,255,255,.18);border-radius:20px;padding:4px 12px;font-size:11px;font-weight:600}
/* ═══ THEORY GRID ═════════════════════════════════════════════ */
.theory-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:20px}
.theory-card{background:var(--sf);border:1px solid var(--bd);border-radius:var(--r);padding:18px;box-shadow:var(--sh)}
.theory-card .icon{font-size:28px;margin-bottom:10px}
.theory-card h3{font-size:14px;font-weight:700;margin-bottom:8px;color:var(--p)}
.theory-card p,.theory-card li{font-size:12.5px;color:var(--ts);line-height:1.7}
.theory-card ul{padding-left:16px;margin-top:6px}
/* ═══ STEP LIST ═══════════════════════════════════════════════ */
.steps{display:flex;flex-direction:column;gap:10px}
.step{display:flex;gap:12px;align-items:flex-start}
.step-num{width:28px;height:28px;border-radius:50%;background:linear-gradient(135deg,var(--p),var(--i));color:#fff;font-size:12px;font-weight:800;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:2px}
.step-body h4{font-size:13px;font-weight:700;margin-bottom:3px}
.step-body p{font-size:12px;color:var(--ts);line-height:1.6}
/* ═══ CALC BOX ════════════════════════════════════════════════ */
.calc-box{background:var(--pl);border:1px solid var(--ps);border-radius:var(--r);padding:20px;margin-bottom:14px}
[data-theme=dark] .calc-box{background:#1a1e40;border-color:#252a5c}
.calc-box h3{font-size:14px;font-weight:700;margin-bottom:14px;color:var(--p)}
.calc-result{background:var(--sf);border:1px solid var(--bd);border-radius:var(--rs);padding:14px;margin-top:12px}
.calc-result .big{font-size:28px;font-weight:800;color:var(--p)}
.formula{background:var(--sb);border-radius:var(--rss);padding:10px 14px;font-family:monospace;font-size:12px;color:var(--ts);margin:8px 0;border-left:3px solid var(--p)}
/* ═══ EXPORT ═════════════════════════════════════════════════ */
.exp-grid{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px}
.exp-btn{display:flex;align-items:center;gap:8px;padding:9px 15px;border-radius:10px;border:1.5px solid var(--bd);background:var(--sf);cursor:pointer;font-size:12px;font-weight:600;color:var(--ts);transition:var(--tr);font-family:inherit}
.exp-btn:hover{border-color:var(--p);color:var(--p);background:var(--pl)}
/* ═══ RÖRLÄNGDER ══════════════════════════════════════════════ */
.rl-cat{margin-bottom:20px}
.rl-cat-header{background:linear-gradient(135deg,var(--p),var(--pd));color:#fff;padding:10px 14px;border-radius:var(--rs) var(--rs) 0 0;font-weight:700;font-size:12px;display:flex;justify-content:space-between;align-items:center}
.rl-cat-body{border:1px solid var(--bd);border-top:0;border-radius:0 0 var(--rs) var(--rs);overflow:hidden}
/* ═══ PROJECTS PAGE ══════════════════════════════════════════ */
.proj-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px;margin-bottom:20px}
.proj-card{background:var(--sf);border:1.5px solid var(--bd);border-radius:var(--r);padding:20px;box-shadow:var(--sh);transition:var(--tr);cursor:pointer;position:relative;overflow:hidden}
.proj-card::before{content:'';position:absolute;top:0;left:0;right:0;height:4px;border-radius:var(--r) var(--r) 0 0}
.proj-card.color-0::before{background:linear-gradient(90deg,#4f46e5,#06b6d4)}
.proj-card.color-1::before{background:linear-gradient(90deg,#10b981,#4f46e5)}
.proj-card.color-2::before{background:linear-gradient(90deg,#f59e0b,#ef4444)}
.proj-card.color-3::before{background:linear-gradient(90deg,#8b5cf6,#ec4899)}
.proj-card.color-4::before{background:linear-gradient(90deg,#06b6d4,#10b981)}
.proj-card:hover{border-color:var(--pi);box-shadow:var(--sh2);transform:translateY(-3px)}
.proj-card h3{font-size:15px;font-weight:800;margin-bottom:4px;margin-top:4px}
.proj-card .proj-desc{font-size:12px;color:var(--ts);margin-bottom:12px;line-height:1.5}
.proj-card .proj-meta{font-size:10px;color:var(--tm);display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.proj-card .proj-types{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:8px}
.proj-card .type-tag{font-size:9px;font-weight:700;padding:2px 7px;border-radius:20px;background:var(--pl);color:var(--p)}
[data-theme=dark] .proj-card .type-tag{background:#1a1e40;color:#a5b4fc}
.proj-card .proj-actions{display:flex;gap:6px;margin-top:12px;padding-top:12px;border-top:1px solid var(--bd)}
.new-proj-card{background:transparent;border:2px dashed var(--bd);border-radius:var(--r);padding:20px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;cursor:pointer;transition:var(--tr);min-height:180px;color:var(--tm);font-weight:600;font-size:13px}
.new-proj-card:hover{border-color:var(--p);color:var(--p);background:var(--pl)}
.new-proj-card .plus{font-size:32px;font-weight:300;line-height:1}
/* ═══ MODAL ═══════════════════════════════════════════════════ */
.modal-wrap{display:none;position:fixed;inset:0;z-index:500;background:rgba(0,0,0,.6);backdrop-filter:blur(4px);align-items:center;justify-content:center;padding:20px}
.modal-wrap.open{display:flex}
.modal{background:var(--sf);border-radius:var(--r);padding:28px;width:100%;max-width:480px;box-shadow:0 24px 60px rgba(0,0,0,.3);border:1px solid var(--bd)}
.modal h3{font-size:18px;font-weight:800;margin-bottom:4px}
.modal .sub{font-size:13px;color:var(--ts);margin-bottom:20px}
.modal .fi{margin-bottom:12px}
.modal .fi label{font-size:11px;font-weight:700;color:var(--ts);margin-bottom:4px;display:block}
.modal .fi input,.modal .fi textarea,.modal .fi select{width:100%;padding:9px 12px;border:1.5px solid var(--bd);border-radius:var(--rss);font-size:13px;background:var(--sa);color:var(--tx);font-family:inherit;transition:var(--tr)}

function save(){
  try{localStorage.setItem(LS,JSON.stringify({projects:S.projects,cur:S.cur,lang:S.lang,dark:S.dark}));}catch(e){}
  try{localStorage.setItem('calcSettings',JSON.stringify(SET));}catch(e){}
}
function load(){
  try{
    const d=JSON.parse(localStorage.getItem(LS)||'null');
    if(d&&d.projects){
      S.projects=d.projects;S.cur=d.cur;
      S.lang=d.lang||'sv';S.dark=!!d.dark;
    }
  }catch(e){}
  if(!Object.keys(S.projects).length){
    const demo={id:'demo',name:'Demo Projekt',desc:'Förifyllt med exempeldata från beräkningsbladet',created:new Date().toISOString(),modified:new Date().toISOString(),color:0,data:demoData()};
    S.projects.demo=demo;S.cur=null;
  }
  if(S.dark)document.documentElement.setAttribute('data-theme','dark');
  try{const ss=localStorage.getItem('calcSettings');if(ss)SET={...SET,...JSON.parse(ss)};}catch(e){}
}

═══════════════════════════════════════════════════════════════ */
function createProject(name,desc,template){
  const id='p_'+Date.now();
  const colors=Object.keys(S.projects).length%5;
  const p={id,name,desc:desc||'',created:new Date().toISOString(),modified:new Date().toISOString(),color:colors,data:template==='demo'?demoData():emptyData()};
  S.projects[id]=p;S.cur=id;save();return id;
}
function deleteProject(id){
  delete S.projects[id];
  if(S.cur===id)S.cur=null;
  save();
}
function curProj(){return S.projects[S.cur]||null;}
function D(key){return S.projects[S.cur]?.data?.[key];}
function touchProj(){if(S.cur&&S.projects[S.cur])S.projects[S.cur].modified=new Date().toISOString();}

const T=(sv,en)=>S.lang==='sv'?sv:en;
function fmt(n,d=2){return typeof n==='number'?n.toFixed(d):String(n);}
function fmtSEK(n){return n.toLocaleString('sv-SE',{maximumFractionDigits:0})+' kr';}
function pct(a,b){return b>0?Math.min(100,Math.max(0,a/b*100)):0;}
function fmtDate(s){try{return new Date(s).toLocaleDateString('sv-SE');}catch{return s;}}
function toast(m,t=2200){const e=document.getElementById('toast');e.textContent=m;e.style.display='block';e.style.animation='slideUp .3s ease';setTimeout(()=>e.style.display='none',t);}
function pcBar(done,total,label){
  if(total<=0)return'';
  const p=pct(done,total);
  return`<div style="margin-bottom:10px"><div class="prog-row"><span style="font-size:12px;font-weight:600">${label}</span><span class="pct">${p.toFixed(0)}%</span></div><div class="prog-bar"><div class="prog-fill" style="width:${p}%"></div></div><div style="font-size:10px;color:var(--tm)">${done.toFixed(1)} / ${total.toFixed(1)} m</div></div>`;
}
function mc(v,lbl,un,cls='',bar=50){
  const disp=typeof v==='number'?(v>9999?Math.round(v).toLocaleString('sv-SE'):v>100?v.toFixed(1):v.toFixed(2)):v;
  return`<div class="mc ${cls}"><div class="v">${disp}</div><div class="lbl">${lbl}</div><div class="un">${un}</div><div class="br"><div class="bf" style="width:${Math.min(100,Math.max(0,bar))}%"></div></div></div>`;
}

/* ═══════════════════════════════════════════════════════════════
   SVG CROSS-SECTION
═══════════════════════════════════════════════════════════════ */
function svgSection(bw,tw,d,pipes=[],label='',animated=false){
  const W=380,H=210,px=44,pt=34;
  const sc=Math.min((W-2*px)/Math.max(tw,.01),(H-pt-24)/Math.max(d,.01));
  const cx=W/2,gy=pt,by=gy+d*sc;
  const hbw=bw*sc/2,htw=tw*sc/2;
  const pipeC=['#6366f1','#06b6d4','#10b981','#f59e0b','#ef4444','#8b5cf6','#ec4899','#f97316'];
  let pipeSVG='';
  if(pipes.length){
    const sp=0.05;
    const totW=pipes.reduce((s,p)=>s+p,0)*sc+sp*(pipes.length-1)*sc;
    let px2=cx-totW/2;
    pipes.forEach((dia,i)=>{
      const r=Math.max(3,dia*sc/2);
      const cy=by-r-.04*sc;
      pipeSVG+=`<circle cx="${(px2+r).toFixed(1)}" cy="${cy.toFixed(1)}" r="${r.toFixed(1)}" fill="${pipeC[i%pipeC.length]}" opacity=".8" stroke="rgba(255,255,255,.3)" stroke-width="1.5"/>
      <text x="${(px2+r).toFixed(1)}" y="${(cy+r+10).toFixed(1)}" text-anchor="middle" font-size="7" fill="rgba(255,255,255,.5)" font-family="Inter,sans-serif">Ø${(dia*1000).toFixed(0)}</text>`;
      px2+=dia*sc+sp*sc;
    });
  }
  const beddH=Math.max(6,0.15*sc);
  const kringH=Math.max(8,0.4*sc);
  const anim=animated?'style="transition:all .4s ease"':'';
  const slope=d>0?(tw-bw)/(2*d):0;
  const slopeLabel=slope>0.01?`1:${slope.toFixed(1)}`:'';
  const wallMidX=(cx+htw+cx+hbw)/2+4,wallMidY=(gy+by)/2;
  return`<svg width="${W}" height="${H}" style="border-radius:12px;background:#0b1425;display:block;width:100%;max-width:${W}px" viewBox="0 0 ${W} ${H}">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#0f2040"/><stop offset="1" stop-color="#1e3a5f"/></linearGradient>
    <linearGradient id="soil" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#3d2b1f" stop-opacity=".6"/><stop offset="1" stop-color="#2d1b0e" stop-opacity=".3"/></linearGradient>
    <pattern id="hatch" patternUnits="userSpaceOnUse" width="8" height="8" patternTransform="rotate(45)"><line x1="0" y1="0" x2="0" y2="8" stroke="rgba(99,102,241,.12)" stroke-width="3"/></pattern>
  </defs>
  <!-- Sky -->
  <rect x="0" y="0" width="${W}" height="${gy}" fill="url(#sky)"/>
  <!-- Soil -->
  <rect x="0" y="${gy}" width="${W}" height="${H-gy}" fill="url(#soil)"/>
  <!-- Soil hatch -->
  <rect x="0" y="${gy}" width="${cx-htw}" height="${H-gy}" fill="url(#hatch)"/>
  <rect x="${cx+htw}" y="${gy}" width="${W-cx-htw}" height="${H-gy}" fill="url(#hatch)"/>
  <!-- Ground line -->
  <line x1="0" y1="${gy}" x2="${W}" y2="${gy}" stroke="#84cc16" stroke-width="1.5" stroke-dasharray="6,4" opacity=".5"/>
  <!-- Trench -->
  <polygon ${anim} points="${(cx-htw).toFixed(1)},${gy} ${(cx+htw).toFixed(1)},${gy} ${(cx+hbw).toFixed(1)},${by.toFixed(1)} ${(cx-hbw).toFixed(1)},${by.toFixed(1)}" fill="rgba(15,20,40,.92)" stroke="rgba(99,102,241,.5)" stroke-width="1.5"/>
  <!-- Kringfyllning zone -->
  <polygon points="${(cx-hbw).toFixed(1)},${(by-beddH-kringH).toFixed(1)} ${(cx+hbw).toFixed(1)},${(by-beddH-kringH).toFixed(1)} ${(cx+hbw).toFixed(1)},${(by-beddH).toFixed(1)} ${(cx-hbw).toFixed(1)},${(by-beddH).toFixed(1)}" fill="rgba(6,182,212,.2)" stroke="rgba(6,182,212,.3)" stroke-width=".5"/>
  <!-- Bädd layer -->
  <rect x="${(cx-hbw).toFixed(1)}" y="${(by-beddH).toFixed(1)}" width="${(hbw*2).toFixed(1)}" height="${beddH.toFixed(1)}" fill="rgba(245,158,11,.55)" stroke="rgba(245,158,11,.4)" stroke-width=".5" rx="2"/>
  <!-- Pipes -->
  ${pipeSVG}
  <!-- TW label -->
  <line x1="${(cx-htw+2).toFixed(1)}" y1="${(gy+10).toFixed(1)}" x2="${(cx+htw-2).toFixed(1)}" y2="${(gy+10).toFixed(1)}" stroke="#c084fc" stroke-width="1" marker-end="url(#a)"/>
  <text x="${cx}" y="${(gy-6)}" text-anchor="middle" font-size="10" fill="#c084fc" font-family="Inter,sans-serif" font-weight="700">TW ${tw.toFixed(2)}m</text>
  <!-- BW label -->
  <text x="${cx}" y="${(by+16).toFixed(1)}" text-anchor="middle" font-size="10" fill="#fbbf24" font-family="Inter,sans-serif" font-weight="700">BW ${bw.toFixed(2)}m</text>
  <!-- D label -->
  <line x1="${(cx+hbw+8).toFixed(1)}" y1="${gy}" x2="${(cx+hbw+8).toFixed(1)}" y2="${by.toFixed(1)}" stroke="#94a3b8" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="${(cx+hbw+14).toFixed(1)}" y="${((gy+by)/2).toFixed(1)}" font-size="10" fill="#94a3b8" font-family="Inter,sans-serif" dominant-baseline="middle" font-weight="600">D ${d.toFixed(2)}m</text>
  <!-- Slope annotation -->
  ${slopeLabel?`<line x1="${(cx+hbw).toFixed(1)}" y1="${by.toFixed(1)}" x2="${(cx+htw).toFixed(1)}" y2="${gy}" stroke="#c084fc" stroke-width="1.2" stroke-dasharray="4,3" opacity=".6"/>
  <text x="${wallMidX.toFixed(1)}" y="${wallMidY.toFixed(1)}" font-size="9" fill="#c084fc" font-family="Inter,sans-serif" font-weight="600" dominant-baseline="middle">${slopeLabel}</text>`:''}
  <!-- Layer labels -->
  <text x="${(cx-hbw-4).toFixed(1)}" y="${(by-beddH/2).toFixed(1)}" text-anchor="end" font-size="8" fill="#fbbf24" font-family="Inter,sans-serif" dominant-baseline="middle" font-weight="600">Bädd</text>
  <text x="${(cx-hbw-4).toFixed(1)}" y="${(by-beddH-kringH/2).toFixed(1)}" text-anchor="end" font-size="8" fill="#06b6d4" font-family="Inter,sans-serif" dominant-baseline="middle" font-weight="600">Kring</text>
  ${label?`<text x="${cx}" y="${H-5}" text-anchor="middle" font-size="9" fill="#475569" font-family="Inter,sans-serif">${label}</text>`:''}
  </svg>`;
}

/* Asymmetric cross-section: left wall vertical (building), right wall sloped */
function svgSectionFB(bw,tw,d,specPipes=[],slJ=0.5,label=''){
  const W=380,H=220,lx=62,pt=34,rm=20;
  const maxD=Math.max(d,...specPipes.map(p=>p.depth||0),0.1);
  const sc=Math.min((W-lx-rm)/Math.max(tw,bw,.01),(H-pt-30)/maxD);
  const gy=pt,by=gy+d*sc;
  const bwPx=bw*sc,twPx=tw*sc;
  const pipeC=['#6366f1','#06b6d4','#10b981','#f59e0b','#ef4444','#8b5cf6'];
  const beddH=Math.max(6,0.15*sc);
  // Building wall texture (left side)
  let bldg='';
  for(let yy=gy;yy<by+4;yy+=6)bldg+=`<line x1="${lx-12}" y1="${yy.toFixed(0)}" x2="${lx}" y2="${(yy+6).toFixed(0)}" stroke="#f97316" stroke-width="1.5" opacity=".7"/>`;
  // Pipes at depth
  let pipeSVG='';
  specPipes.forEach((p,i)=>{
    const py=gy+p.depth*sc;
    if(py<gy||py>by-2)return;
    const pr=Math.max(4,Math.min(p.dia/2*sc,bwPx/2-3));
    const pcx=lx+bwPx/2;
    pipeSVG+=`<circle cx="${pcx.toFixed(1)}" cy="${py.toFixed(1)}" r="${pr.toFixed(1)}" fill="${pipeC[i%pipeC.length]}" opacity=".9" stroke="rgba(255,255,255,.3)" stroke-width="1.5"/>`;

    pipeSVG+=`<line x1="${lx}" y1="${py.toFixed(1)}" x2="${(lx-10).toFixed(1)}" y2="${py.toFixed(1)}" stroke="#94a3b8" stroke-width="1" stroke-dasharray="2,2"/>`;
    pipeSVG+=`<text x="${(lx-12).toFixed(1)}" y="${py.toFixed(1)}" text-anchor="end" dominant-baseline="middle" font-size="7" fill="#94a3b8" font-family="Inter,sans-serif">${p.depth.toFixed(1)}m</text>`;
  });
  // Slope annotation on right side
  const slopePx=slJ*d*sc;
  const midY=(gy+by)/2;
  return`<svg width="${W}" height="${H}" style="border-radius:12px;background:#0b1425;display:block;width:100%;max-width:${W}px" viewBox="0 0 ${W} ${H}">
  <defs>
    <linearGradient id="skyFB" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#0f2040"/><stop offset="1" stop-color="#1e3a5f"/></linearGradient>

    <pattern id="hatchFB" patternUnits="userSpaceOnUse" width="8" height="8" patternTransform="rotate(45)"><line x1="0" y1="0" x2="0" y2="8" stroke="rgba(99,102,241,.12)" stroke-width="3"/></pattern>
    <pattern id="bldgPat" patternUnits="userSpaceOnUse" width="12" height="12"><rect width="12" height="12" fill="#1a0a00"/><line x1="0" y1="0" x2="12" y2="12" stroke="#92400e" stroke-width="1.5" opacity=".6"/></pattern>
  </defs>
  <rect x="0" y="0" width="${W}" height="${gy}" fill="url(#skyFB)"/>
  <rect x="0" y="${gy}" width="${W}" height="${H-gy}" fill="url(#soilFB)"/>
  <!-- Right-side soil hatch -->
  <rect x="${(lx+twPx).toFixed(1)}" y="${gy}" width="${(W-lx-twPx).toFixed(1)}" height="${H-gy}" fill="url(#hatchFB)"/>
  <!-- Building wall block -->
  <rect x="0" y="${gy-2}" width="${lx}" height="${H-gy+2}" fill="url(#bldgPat)" stroke="#f97316" stroke-width="1.5" opacity=".9"/>

  <line x1="${lx}" y1="${gy}" x2="${W}" y2="${gy}" stroke="#84cc16" stroke-width="1.5" stroke-dasharray="6,4" opacity=".5"/>

/* ═══════════════════════════════════════════════════════════════
   CALCULATIONS
═══════════════════════════════════════════════════════════════ */
function fvBW(pt){return Math.max(.6,pt.c+.1+pt.d+.1+.2);}
function elBW(pt){
  const n=pt.n50+pt.n110+pt.n160;
  if(!n)return.42;
  const dia=pt.n50*.05+pt.n110*.11+pt.n160*.16;
  const el=D('EL');
  return dia+(el?.cfg.spacingI||.05)*Math.max(0,n-1)+(el?.cfg.spacingL||.05)*2;
}
function elAll(){
  const EL=D('EL');if(!EL)return{segs:[],tot:zEL()};
  const c=EL.cfg,pts=EL.pts,segs=[];
  for(let i=0;i<pts.length-1;i++){
    const p1=pts[i],p2=pts[i+1],L=Math.abs(p2.w-p1.w);
    if(L<=0||!p1.h)continue;
    const bw1=elBW(p1),bw2=elBW(p2);
    const tw1J=p1.e*c.slopeJord*2+bw1,tw2J=p2.e*c.slopeJord*2+bw2;
    const tw1B=p1.d>0?p1.d*c.slopeBerg*2+bw1+1:0,tw2B=p2.d>0?p2.d*c.slopeBerg*2+bw2+1:0;
    const tw1=c.spont>=2?bw1:Math.max(tw1J,tw1B||0);
    const tw2=c.spont>=2?bw2:Math.max(tw2J,tw2B||0);
    const jordV=((bw1+tw1J)/2*p1.e+(bw2+tw2J)/2*p2.e)/2*L;
    const bergV=(p1.d>0?(bw1+tw1B)/2*p1.d:0+p2.d>0?(bw2+tw2B)/2*p2.d:0)/2*L;
    const excV=jordV+bergV;
    const ab=(bw1+bw2)/2,at=(tw1+tw2)/2,ad=(p1.e+p1.d+p2.e+p2.d)/2;
    const bed=L*ab*c.sfh,bedA=L*ab;
    const sur=Math.max(0,(ab*(c.sfh+.1)*L-bed));
    const remA=Math.max(0,excV-bed-sur),remB=Math.max(0,jordV-bed-sur);
    const sLen=Math.sqrt(ad**2+(ad*c.slopeJord)**2);
    let geo=0;if(c.geoType===1)geo=L*ab*2;else if(c.geoType>=2)geo=L*(ab+2*sLen+.3);
    const aa=c.asphalt>0?L*at:0,va=c.veg>0?L*at:0,sp=c.spont>0?L*ad*c.spont:0;
    const bergAvt=bergV>0?L*at*.1:0;
    segs.push({f:p1.w,t:p2.w,L,ad,ab,at,exc:excV,jord:jordV,berg:bergV,bed,bedA,sur,remA,remB,geo,aa,va,sp,bal:excV-(bed+sur+remA),bergAvt,bw1,tw1,done:p1.done});
  }
  return{segs,tot:sumSegs(segs,'el')};
}
function calcSections(pts,cfg,getBW,sideMult=2){
  const segs=[];
  for(let i=0;i<pts.length-1;i++){
    const p1=pts[i],p2=pts[i+1],L=Math.abs(p2.i-p1.i);
    if(L<=0)continue;
    const bw1=getBW(p1),bw2=getBW(p2);
    const slJ=cfg.spont>=2?0:(p1.g||cfg.slopeJord||cfg.slope||.5);
    const slB=cfg.spont>=2?0:(cfg.slopeBerg||slJ);
    const d1=p1.e+p1.f,d2=p2.e+p2.f;
    const bd1=Math.min(p1.bd||0,d1),bd2=Math.min(p2.bd||0,d2);
    // Top width: sideMult=2 both sides slope, sideMult=1 one side only (FB = against building)
    const tw1=bw1+sideMult*(bd1>0?bd1*slB+(d1-bd1)*slJ:d1*slJ);
    const tw2=bw2+sideMult*(bd2>0?bd2*slB+(d2-bd2)*slJ:d2*slJ);
    const exc=((bw1+tw1)/2*d1+(bw2+tw2)/2*d2)/2*L;
    // Jord/berg volume split: geometric when bd>0, else use K%
    let jord,berg;
    if(bd1>0||bd2>0){
      const hy1=bw1+2*bd1*slB,hy2=bw2+2*bd2*slB;
      const excB=((bw1+hy1)/2*bd1+(bw2+hy2)/2*bd2)/2*L;
      const excJ=((hy1+tw1)/2*(d1-bd1)+(hy2+tw2)/2*(d2-bd2))/2*L;
      jord=excJ;berg=excB;
    } else {
      const kj1=p1.k||1,kj2=p2.k||1;
      jord=exc*(kj1+kj2)/2;berg=exc*(1-(kj1+kj2)/2);
    }
    const bed=L*(bw1+bw2)/2*(p1.f+p2.f)/2,bedA=L*(bw1+bw2)/2;
    const ab=(bw1+bw2)/2,ad=(d1+d2)/2,at=(tw1+tw2)/2;
    const sur=Math.max(0,(ab*(p1.a+p2.a)/2-(p1.f+p2.f)/2)*L);
    const rem=Math.max(0,exc-bed-sur);
    const sLen=Math.sqrt(ad**2+(ad*slJ)**2);
    let geo=0;if(cfg.geoType===1)geo=L*ab;else if(cfg.geoType>=2)geo=L*(ab+2*sLen+.3);
    segs.push({f:p1.i,t:p2.i,L,ad,ab,at,exc,jord,berg,bed,bedA,sur,rem,geo,aa:cfg.asphalt>0?L*at:0,va:cfg.veg>0?L*at:0,sp:cfg.spont>0?L*ad:0,bal:exc-(bed+sur+rem),bw1,tw1,done:p1.done});
  }
  return{segs,tot:sumSegs(segs,'fv')};
}
function fvAll(){const FV=D('FV');if(!FV)return{segs:[],tot:zFV()};return calcSections(FV.pts,FV.cfg,fvBW);}
function fbAll(){
  const FB=D('FB');if(!FB)return{segs:[],tot:zFV()};
  if(!FB.spec)FB.spec={pipes:[],bw:.6,badd:.15};
  // Migrate: if spec.pipes empty but pts have c/d, seed from first point
  if(!FB.spec.pipes.length&&FB.pts.length&&(FB.pts[0].c||FB.pts[0].d)){
    const p0=FB.pts[0];
    if(p0.c)FB.spec.pipes.push({name:'Rör 1',dia:p0.c,depth:p0.e});
    if(p0.d&&p0.d!==p0.c)FB.spec.pipes.push({name:'Rör 2',dia:p0.d,depth:Math.max(0.5,p0.e-0.4)});
  }
  const sps=FB.spec.pipes;
  const fbBW=()=>sps.length?Math.max(.4,sps.reduce((s,p)=>s+p.dia,0)+.20):.60;
  return calcSections(FB.pts,FB.cfg,fbBW,1);  // sideMult=1: left wall is vertical (building)
}
function trAll(){const TR=D('TR');if(!TR)return{segs:[],tot:zFV()};return calcSections(TR.pts,TR.cfg,(pt)=>pt.c+pt.d+.1);}
function vaAll(){
  const VA=D('VA');if(!VA)return{segs:[],tot:zVA()};
  const c=VA.cfg,pr=D('BUD')?.prices||PRC_GLOBAL,segs=[],geoVA=(c.geoType>0?(pr['geo'+c.geoType]||0):0);
  for(let i=0;i<VA.pts.length-1;i++){
    const p1=VA.pts[i],p2=VA.pts[i+1],L=Math.abs(p2.n-p1.n);
    if(L<=0)continue;
    const bw=p1.bw||1.1;
    const d1=p1.r+p1.d+p1.e+c.rb+p1.a,d2=p2.r+p2.d+p2.e+c.rb+p2.a;
    const slV=c.spont>=2?0:(p1.f||c.slopeV),slH=c.spont>=2?0:(p1.h||c.slopeH);
    const bd1=Math.min(p1.c||0,d1),bd2=Math.min(p2.c||0,d2);
    // Symmetric two-slope geometry: rock zone uses slopeH, soil zone slopeV
    const tw1=bw+2*(bd1>0?bd1*slH+(d1-bd1)*slV:d1*slV);
    const tw2=bw+2*(bd2>0?bd2*slH+(d2-bd2)*slV:d2*slV);
    const exc=((bw+tw1)/2*d1+(bw+tw2)/2*d2)/2*L;
    // Jord/berg split: geometric when bd>0, else K% fraction
    let jord,berg;
    if(bd1>0||bd2>0){
      const hy1=bw+2*bd1*slH,hy2=bw+2*bd2*slH;
      const excB=((bw+hy1)/2*bd1+(bw+hy2)/2*bd2)/2*L;
      const excJ=((hy1+tw1)/2*(d1-bd1)+(hy2+tw2)/2*(d2-bd2))/2*L;
      jord=excJ;berg=excB;
    } else {
      const frac=(p1.c||0)/Math.max(p1.r||d1,0.001);
      jord=exc*(1-frac);berg=Math.max(0,exc*frac);
    }
    const bed=L*bw*(c.badd||0),bedA=L*bw;
    const sur=Math.max(0,bw*c.sfh*L-bed),remA=Math.max(0,exc-bed-sur);
    const ad=(d1+d2)/2,at=(tw1+tw2)/2;
    const avgSl=(slV+slH)/2,sLen=Math.sqrt(ad**2+(ad*avgSl)**2);
    let geo=0;if(c.geoType===1)geo=L*bw;else if(c.geoType>=2)geo=L*(bw+2*sLen+.3);
    const aa=c.asphalt>0?L*Math.max(at,c.roadW):0,va=c.veg>0?L*Math.max(at,c.roadW):0;
    const sp=c.spont>0?L*ad*c.spont:0,bergAvt=berg>0?L*at*.1:0;
    const cost=jord*pr.jord+berg*pr.berg+bed*pr.badd+sur*pr.kring+remA*pr.restA+aa*pr.asfalt+va*pr.veg+bergAvt*pr.avtatn+sp*pr.spont+geo*geoVA;
    segs.push({f:p1.n,t:p2.n,L,ad,ab:bw,at,exc,jord,berg,bed,bedA,sur,remA,geo,aa,va,sp,bergAvt,bal:exc-(bed+sur+remA),cost,done:p1.done,doneR:p1.doneR,bw,tw:tw1});
  }
  return{segs,tot:sumSegsVA(segs)};
}
function zEL(){return{l:0,exc:0,jord:0,berg:0,bed:0,bedA:0,sur:0,remA:0,remB:0,geo:0,aa:0,va:0,sp:0,bal:0,bergAvt:0,done:0,total:0};}
function zFV(){return{l:0,exc:0,jord:0,berg:0,bed:0,bedA:0,sur:0,rem:0,geo:0,aa:0,va:0,sp:0,bal:0,done:0,total:0};}
function zVA(){return{l:0,exc:0,jord:0,berg:0,bed:0,bedA:0,sur:0,remA:0,geo:0,aa:0,va:0,sp:0,bergAvt:0,bal:0,cost:0,done:0,doneR:0,total:0};}
function sumSegs(segs,type){
  const z=type==='el'?zEL():zFV();
  segs.forEach(s=>{
    z.l+=s.L;z.exc+=s.exc;z.jord+=s.jord;z.berg+=s.berg;z.bed+=s.bed;z.bedA+=s.bedA;
    z.sur+=s.sur;z.geo+=s.geo;z.aa+=s.aa;z.va+=s.va;z.sp+=s.sp;z.bal+=s.bal;
    if(type==='el'){z.remA+=s.remA;z.remB+=s.remB;z.bergAvt+=s.bergAvt;}else{z.rem+=s.rem;}
    if(s.done)z.done+=s.L;z.total+=s.L;
  });return z;
}
function sumSegsVA(segs){
  const z=zVA();
  segs.forEach(s=>{z.l+=s.L;z.exc+=s.exc;z.jord+=s.jord;z.berg+=s.berg;z.bed+=s.bed;z.bedA+=s.bedA;z.sur+=s.sur;z.remA+=s.remA;z.geo+=s.geo;z.aa+=s.aa;z.va+=s.va;z.sp+=s.sp;z.bergAvt+=s.bergAvt;z.bal+=s.bal;z.cost+=s.cost;if(s.done)z.done+=s.L;if(s.doneR)z.doneR+=s.L;z.total+=s.L;});
  return z;
}

function go(p){
  const pages={projects:renderProjects,start:renderStart,dashboard:renderDashboard,el:renderEL,fv:renderFV,fb:renderFB,tr:renderTR,va:renderVA,fvspec:renderFVSpec,vaspec:renderVASpec,rl:renderRL,sm:renderSM,budget:renderBudget,settings:renderSettings};
  if(p===S.page){
    clearTimeout(_goTimer);
    const scrollY=window.scrollY;
    // Save which input/select has focus so we can restore it after re-render
    const ae=document.activeElement;
    let _fp=null;
    if(ae&&(ae.tagName==='INPUT'||ae.tagName==='SELECT')){
      if(ae.id){_fp={id:ae.id};}
      else{
        const _tb=ae.closest('tbody'),_tr=ae.closest('tr'),_td=ae.closest('td');
        if(_tb&&_tr&&_td){
          const _allTb=Array.from(document.querySelectorAll('tbody'));
          _fp={tbi:_allTb.indexOf(_tb),ri:Array.from(_tb.rows).indexOf(_tr),ci:Array.from(_tr.cells).indexOf(_td)};
        }
      }
    }
    _goTimer=setTimeout(()=>{
      const m=document.getElementById('main');
      destroyCharts();
      m.innerHTML=(pages[p]||renderProjects)();
      window.scrollTo(0,scrollY);
      renderSidebar();renderBNav();
      // Restore focus to the same input cell
      if(_fp){
        let _el=_fp.id?document.getElementById(_fp.id):null;
        if(!_el&&_fp.tbi!=null){
          const _tbs=document.querySelectorAll('tbody');
          const _tb2=_tbs[_fp.tbi];
          if(_tb2&&_fp.ri<_tb2.rows.length){
            const _row=_tb2.rows[_fp.ri];
            if(_row&&_fp.ci<_row.cells.length)
              _el=_row.cells[_fp.ci].querySelector('input,select');
          }
        }
        if(_el){_el.focus();try{_el.select();}catch{}}
      }
      setTimeout(renderCharts,60);
    },300);
    return;
  }
  // Navigation to a different page: scroll to top, reset segment
  clearTimeout(_goTimer);
  S.page=p;S.selSeg=0;
  renderSidebar();renderBNav();
  const m=document.getElementById('main');
  destroyCharts();
  m.innerHTML=(pages[p]||renderProjects)();
  window.scrollTo(0,0);
  setTimeout(renderCharts,60);
}

// Allow comma as decimal separator in number inputs (Swedish locale)
document.addEventListener('keydown',function(e){
  if(e.target.tagName==='INPUT'&&e.target.type==='number'&&e.key===','){
    e.preventDefault();
    const v=e.target.value,p=e.target.selectionStart||v.length;
    if(!v.includes('.')){e.target.value=v.slice(0,p)+'.'+v.slice(p);e.target.setSelectionRange(p+1,p+1);e.target.dispatchEvent(new Event('input',{bubbles:true}));}
  }
});

}
function projSummary(p){
  const backup=S.cur;S.cur=p.id;
  let el=0,fv=0,fb=0,tr=0,va=0;
  try{el=elAll().tot.exc||0;}catch(e){}
  try{fv=fvAll().tot.exc||0;}catch(e){}
  try{fb=fbAll().tot.exc||0;}catch(e){}
  try{tr=trAll().tot.exc||0;}catch(e){}
  try{va=vaAll().tot.exc||0;}catch(e){}
  S.cur=backup;
  return{el,fv,fb,tr,va};
}

function calcSchakt(){
  const l=+document.getElementById('sc_l').value||0;
  const bw=+document.getElementById('sc_bw').value||0;
  const d=+document.getElementById('sc_d').value||0;
  const sl=(parseFloat(document.getElementById('sc_sl').value)||0)/(parseFloat(document.getElementById('sc_sl_x')?.value)||1);
  const badd=+document.getElementById('sc_badd').value||0;
  const kring=+document.getElementById('sc_kring').value||0;
  const tw=bw+2*d*sl;
  const vol=l*(bw+tw)/2*d;
  const beddV=l*bw*badd;
  const surV=Math.max(0,l*bw*kring-beddV);
  const bal=vol-(beddV+surV);
  document.getElementById('sc_formula').textContent=`TW = ${bw}+2×${d}×${sl} = ${tw.toFixed(2)}m    V = ${l}×(${bw.toFixed(2)}+${tw.toFixed(2)})/2×${d} = ${vol.toFixed(2)} m³`;
  document.getElementById('sc_tot').textContent=vol.toFixed(2);
  document.getElementById('sc_tw').textContent=tw.toFixed(2);
  document.getElementById('sc_bed').textContent=beddV.toFixed(2);
  document.getElementById('sc_sur').textContent=surV.toFixed(2);
  document.getElementById('sc_bal').textContent=bal.toFixed(2);
  document.getElementById('sc_svg').innerHTML=`<div class="svg-box">${svgSection(bw,tw,d,[],`L=${l}m | V=${vol.toFixed(1)}m³`,true)}</div>`;
}

/* ═══════════════════════════════════════════════════════════════
   RENDER: Vatten och Avlopp
═══════════════════════════════════════════════════════════════ */
function renderVA(){
  if(!curProj())return emptyProj();
  const{segs,tot}=vaAll();const VA=D('VA');const mx=Math.max(tot.exc,1);
  const seg=segs[S.selSeg]||segs[0];
  // ── VA-spec integration (rör i olika djup) ──
  if(VA&&!VA.spec)VA.spec={pipes:[],bw:1.1,badd:.15};
  // Migrate: if spec.pipes is empty but cfg.pipes has entries, seed from cfg.pipes with staggered depths
  if(VA&&VA.cfg.pipes.length&&!VA.spec.pipes.length){
    VA.spec.pipes=VA.cfg.pipes.map((dia,i)=>({name:'DN'+Math.round(dia*1000),dia,depth:Math.max(0.5,2.0-i*0.5)}));
  }
  const spec=VA?VA.spec:{pipes:[],bw:1.1,badd:.15};
  const specBW=spec.bw||1.1,specBadd=spec.badd||.15;
  const specPipes=[...spec.pipes].map((p,oi)=>({...p,oi})).sort((a,b)=>b.depth-a.depth);
  const specLayers=[];
  if(specPipes.length>0){
    specLayers.push({type:'badd',h:specBadd,col:'#d97706'});
    for(let si=0;si<specPipes.length;si++){
      const sp=specPipes[si];const kh=sp.dia+SET.kringAMA;
      const kTop=sp.depth-sp.dia/2-SET.kringAMA;
      specLayers.push({type:'kring',h:kh,col:'#10b981',pipe:sp});
      if(si<specPipes.length-1){const nxt=specPipes[si+1];const gap=kTop-(nxt.depth+nxt.dia/2);if(gap>0.005)specLayers.push({type:'rest',h:gap,col:'#94a3b8'});}
    }
    const shs=specPipes[specPipes.length-1];
    const ra=shs.depth-shs.dia/2-SET.kringAMA;
    if(ra>0.005)specLayers.push({type:'rest',h:ra,col:'#64748b'});
  }
  const specTotBadd=specLayers.filter(l=>l.type==='badd').reduce((s,l)=>s+l.h,0);
  const specTotKring=specLayers.filter(l=>l.type==='kring').reduce((s,l)=>s+l.h,0);
  const specTotRest=specLayers.filter(l=>l.type==='rest').reduce((s,l)=>s+l.h,0);
  const specTotalH=specLayers.reduce((s,l)=>s+l.h,0);
  const specKLs=specLayers.filter(l=>l.type==='kring');
  const specSnitth=specKLs.length?specKLs.reduce((s,l)=>s+l.h,0)/specKLs.length:0;
  // Build spec SVG — same dark style as svgSection(), string concat avoids nested template literals
  const svgW2=380,svgH2=210,svgPx2=44,svgPt2=34;
  const svgSlJ2=VA?VA.cfg.slopeV||0:0;
  const svgMaxD2=specPipes.length?Math.max(...specPipes.map(p=>p.depth))+Math.max(...specPipes.map(p=>p.dia))/2+0.2:Math.max(specTotalH,0.5);
  const svgTwM2=specBW+2*svgSlJ2*svgMaxD2;
  const svgSc2=Math.min((svgW2-2*svgPx2)/Math.max(svgTwM2,0.01),(svgH2-svgPt2-24)/Math.max(svgMaxD2,0.01));
  const svgCx2=svgW2/2,svgGy2=svgPt2,svgBy2=svgGy2+svgMaxD2*svgSc2;
  const svgHbw2=specBW*svgSc2/2,svgHtw2=svgTwM2*svgSc2/2;

    +'<text x="'+(svgCx2-svgHbw2-4).toFixed(1)+'" y="'+(svgBy2-svgBeddH2/2).toFixed(1)+'" text-anchor="end" font-size="8" fill="#fbbf24" font-family="Inter,sans-serif" dominant-baseline="middle" font-weight="600">Bädd</text>'

  <div class="cg2">
    <div class="cd"><div class="ct"><span class="dot" style="background:var(--i)"></span>${T('Djupprofil','Depth profile')}</div>
      <div class="ch-wrap"><canvas id="ch-va-depth"></canvas></div></div>
    <div class="cd"><div class="ct"><span class="dot" style="background:var(--s)"></span>${T('Volymer per segment','Volume per segment')}</div>
      <div class="ch-wrap"><canvas id="ch-va-seg"></canvas></div></div>
  </div>
  <div class="cd"><div class="ct"><span class="dot" style="background:var(--a)"></span>${T('Profilpunkter','Profile points')}
    <span style="margin-left:auto;font-size:9px;font-weight:400;text-transform:none;color:var(--ts)">${T('Klicka rad = visa tvärsnitt','Click row = show section')}</span>
  </div>
  <div class="tbl-wrap"><table class="dt">
    <thead><tr><th>${T('Punkt (m)','Point (m)')}</th><th>R ${T('Jorddjup','Soil depth')}</th><th>D ${T('Bergdjup','Rock depth')}</th><th>BW</th><th>A ${T('Kring','Surr.')}</th><th>${T('Jord m³','Soil m³')}</th><th>${T('Berg m³','Rock m³')}</th><th>${T('Bädd m³','Bed m³')}</th><th>${T('Kring m³','Surr m³')}</th><th>✓</th><th></th></tr></thead>
    <tbody>${VA.pts.map((p,i)=>`<tr class="seg-row ${p.done?'done-row':''} ${i===S.selSeg?'sel-row':''}" onclick="selectSeg(${i})">
      <td><input type="number" value="${p.n}" step="5" onclick="event.stopPropagation()" onchange="D('VA').pts[${i}].n=+this.value;touchProj();save();go('va')"></td>
      <td><input type="text" inputmode="decimal" value="${p.r}" step=".1" onclick="event.stopPropagation()" onchange="D('VA').pts[${i}].r=parseFloat(this.value.replace(',','.'))||0;touchProj();save();go('va')"></td>
      <td><input type="text" inputmode="decimal" value="${p.c}" step=".1" min="0" onclick="event.stopPropagation()" onchange="D('VA').pts[${i}].c=parseFloat(this.value.replace(',','.'))||0;touchProj();save();go('va')"></td>
      <td><input type="text" inputmode="decimal" value="${p.bw}" step=".05" onclick="event.stopPropagation()" onchange="D('VA').pts[${i}].bw=parseFloat(this.value.replace(',','.'))||0;touchProj();save();go('va')"></td>
      <td><input type="text" inputmode="decimal" value="${p.a}" step=".05" onclick="event.stopPropagation()" onchange="D('VA').pts[${i}].a=parseFloat(this.value.replace(',','.'))||0;touchProj();save();go('va')"></td>
      ${segs[i]?`<td class="num">${segs[i].jord.toFixed(1)}</td><td class="num">${segs[i].berg.toFixed(1)}</td><td class="num">${segs[i].bed.toFixed(1)}</td><td class="num">${segs[i].sur.toFixed(1)}</td>`:'<td colspan="4">–</td>'}
      <td><input type="checkbox" ${p.done?'checked':''} onclick="event.stopPropagation()" onchange="D('VA').pts[${i}].done=this.checked?1:0;touchProj();save();go('va')"></td>
      <td>${VA.pts.length>2?`<button class="bd-btn" onclick="event.stopPropagation();D('VA').pts.splice(${i},1);touchProj();save();go('va')">✕</button>`:''}</td>
    </tr>`).join('')}
    </tbody>
    <tfoot><tr><td colspan="5">${T('TOTALT','TOTAL')}</td><td class="num">${tot.jord.toFixed(1)}</td><td class="num">${tot.berg.toFixed(1)}</td><td class="num">${tot.bed.toFixed(1)}</td><td class="num">${tot.sur.toFixed(1)}</td><td colspan="2"></td></tr></tfoot>
  </table></div>
  <div class="btn-row"><button class="btn bp" onclick="const l=D('VA').pts;l.push({...l[l.length-1],n:l[l.length-1].n+15,done:0,doneR:0});touchProj();save();go('va')">+ ${T('Punkt','Point')}</button></div></div>
  ${segs.length?`<div class="cd"><div class="ct"><span class="dot" style="background:#8b5cf6"></span>${T('Segmentdetaljer','Segment details')}</div>
  <div class="tbl-wrap"><table class="dt">
    <thead><tr><th>${T('Från','From')}</th><th>${T('Till','To')}</th><th>L(m)</th><th>${T('Medeldjup','Avg depth')}</th><th>BW</th><th>TW</th><th>${T('Jord m³','Soil m³')}</th><th>${T('Berg m³','Rock m³')}</th><th>${T('Bädd m³','Bed m³')}</th><th>${T('Kring m³','Surr m³')}</th><th>${T('Balans','Balance')}</th></tr></thead>
    <tbody>${segs.map((s,i)=>`<tr class="${s.done?'done-row':''} ${i===S.selSeg?'sel-row':''}" onclick="selectSeg(${i})">
      <td>${s.f}</td><td>${s.t}</td><td>${s.L.toFixed(1)}</td><td>${s.ad.toFixed(2)}</td>
      <td>${s.ab.toFixed(2)}</td><td>${s.at.toFixed(2)}</td>
      <td class="num">${s.jord.toFixed(2)}</td><td class="num">${s.berg.toFixed(2)}</td>
      <td class="num">${s.bed.toFixed(2)}</td><td class="num">${s.sur.toFixed(2)}</td>
      <td class="num ${s.bal<0?'bad':''}">${s.bal.toFixed(2)}</td>
    </tr>`).join('')}</tbody>
    <tfoot><tr><td colspan="6">${T('TOTALT','TOTAL')}</td><td class="num">${tot.jord.toFixed(2)}</td><td class="num">${tot.berg.toFixed(2)}</td><td class="num">${tot.bed.toFixed(2)}</td><td class="num">${tot.sur.toFixed(2)}</td><td class="num ${tot.bal<0?'bad':''}">${tot.bal.toFixed(2)}</td></tr></tfoot>
  </table></div></div>`:''}
  </div>`;
}

/* ═══════════════════════════════════════════════════════════════
   RENDER: FV-SPEC
═══════════════════════════════════════════════════════════════ */
function renderFVSpec(){
  if(!curProj())return emptyProj();
  const{segs,tot}=fvAll();
  const deep=segs.filter(s=>s.ad>1),shallow=segs.filter(s=>s.ad<=1);
  const dJord=deep.reduce((s,x)=>s+x.jord,0),sJord=shallow.reduce((s,x)=>s+x.jord,0);
  const dBerg=deep.reduce((s,x)=>s+x.berg,0);
  const dLen=deep.reduce((s,x)=>s+x.L,0),sLen=shallow.reduce((s,x)=>s+x.L,0);
  return`<div>
  <div class="ph"><h2>📋 FV-spec — ${T('Djupspecifikation','Depth specification')}</h2>
  <div class="sub">${T('Uppdelning av FV-schakt per djup (>1.0m / ≤1.0m) enligt MER.','FV excavation split by depth (>1.0m / ≤1.0m) per MER rules.')}</div></div>
  <div class="infobox"><h4>ℹ️ ${T('MER-krav för djupspecifikation','MER requirements for depth specification')}</h4>
    ${T('MER kräver separat redovisning av schakt djupare och grundare än 1.0m. Automatisk beräkning baseras på medeldjupet per segment.','MER requires separate reporting of excavation deeper and shallower than 1.0m. Automatic calculation based on average depth per segment.')}</div>
  <div class="cg2">
    <div class="cd" style="border-left:4px solid var(--d)"><div class="ct"><span class="dot" style="background:var(--d)"></span>${T('Djupt schakt > 1.0m','Deep excavation > 1.0m')}</div>
      <div class="mg" style="margin-bottom:0">
        ${mc(dLen.toFixed(0),T('Längd','Length'),'m','c2',pct(dLen,tot.l))}
        ${mc(dJord.toFixed(1),T('Jordschakt','Soil exc.'),'m³','c2',pct(dJord,tot.jord))}
        ${mc(dBerg.toFixed(1),T('Bergschakt','Rock exc.'),'m³','c2',pct(dBerg,tot.berg))}
      </div></div>
    <div class="cd" style="border-left:4px solid var(--s)"><div class="ct"><span class="dot" style="background:var(--s)"></span>${T('Grunt schakt ≤ 1.0m','Shallow excavation ≤ 1.0m')}</div>
      <div class="mg" style="margin-bottom:0">
        ${mc(sLen.toFixed(0),T('Längd','Length'),'m','c4',pct(sLen,tot.l))}
        ${mc(sJord.toFixed(1),T('Jordschakt','Soil exc.'),'m³','c4',pct(sJord,tot.jord))}
        ${mc((tot.sur).toFixed(1),T('Kringfyllning','Surr.fill'),'m³','c4',50)}
      </div></div>
  </div>
  <div class="cg2">
    <div class="cd"><div class="ct"><span class="dot" style="background:var(--p)"></span>${T('Längdfördelning djup','Length split by depth')}</div>
      <div class="ch-wrap"><canvas id="ch-fvs-depth"></canvas></div></div>
    <div class="cd"><div class="ct"><span class="dot" style="background:var(--a)"></span>${T('Volymfördelning djup','Volume split by depth')}</div>
      <div class="ch-wrap"><canvas id="ch-fvs-vol"></canvas></div></div>
  </div>
  <div class="cd"><div class="ct"><span class="dot" style="background:#8b5cf6"></span>${T('Segment per djupklass','Segments by depth class')}</div>
  <div class="tbl-wrap"><table class="dt">
    <thead><tr><th>${T('Från','From')}</th><th>${T('Till','To')}</th><th>L(m)</th><th>${T('Medeldjup','Avg depth')}</th><th>${T('Klass','Class')}</th><th>${T('Jord m³','Soil m³')}</th><th>${T('Berg m³','Rock m³')}</th><th>${T('Bädd m³','Bed m³')}</th><th>${T('Kring m³','Surr m³')}</th></tr></thead>
    <tbody>${segs.map(s=>`<tr>
      <td>${s.f}</td><td>${s.t}</td><td>${s.L.toFixed(1)}</td><td>${s.ad.toFixed(2)}</td>
      <td><span style="font-weight:700;color:${s.ad>1?'var(--d)':'var(--s)'}">${s.ad>1?'>1.0m':'≤1.0m'}</span></td>
      <td class="num">${s.jord.toFixed(2)}</td><td class="num">${s.berg.toFixed(2)}</td>
      <td class="num">${s.bed.toFixed(2)}</td><td class="num">${s.sur.toFixed(2)}</td>
    </tr>`).join('')}</tbody>
  </table></div></div></div>`;
}


/* ═══════════════════════════════════════════════════════════════
   RENDER: VA-SPEC — RÖRLEDNINGAR I OLIKA DJUP
═══════════════════════════════════════════════════════════════ */
function renderVASpec(){
  if(!curProj())return emptyProj();
  const VA=D('VA');if(!VA)return emptyProj();
  if(!VA.spec) VA.spec={pipes:[{name:'Vatten',dia:.315,depth:2.5,sfh:.5},{name:'Spillvatten',dia:.16,depth:1.8,sfh:.4}],bw:1.1,badd:.15};
  const spec=VA.spec;
  const bw=spec.bw||1.1;
  const badd=spec.badd||.15;
  const totalL=Math.max(vaAll().tot.l,1);

  // Sort pipes deepest first, tag original index
  const pipes=[...spec.pipes].map((p,oi)=>({...p,oi})).sort((a,b)=>b.depth-a.depth);

  // Build layers (bottom → top order)
  const layers=[];
  if(pipes.length>0){
    layers.push({name:T('Bädd djupaste rör','Bedding deepest pipe'),type:'badd',h:badd,col:'#d97706'});
    for(let i=0;i<pipes.length;i++){
      const p=pipes[i];
      const kh=p.dia+SET.kringAMA;
      const kringTop=p.depth-p.dia/2-SET.kringAMA;
      layers.push({name:`${T('Kringfyllning','Surround fill')} — ${p.name} DN${Math.round(p.dia*1000)}`,type:'kring',h:kh,col:'#10b981',pipe:p});
      if(i<pipes.length-1){
        const nxt=pipes[i+1];
        const gap=kringTop-(nxt.depth+nxt.dia/2);
        if(gap>0.005) layers.push({name:T('Restfyllning mellanzon','Rest fill between zones'),type:'rest',h:gap,col:'#94a3b8'});
      }
    }
    const sh=pipes[pipes.length-1];
    const restAbove=sh.depth-sh.dia/2-SET.kringAMA;
    if(restAbove>0.005) layers.push({name:T('Restfyllning ovan','Rest fill above'),type:'rest',h:restAbove,col:'#64748b'});
  }

  const totBadd=layers.filter(l=>l.type==='badd').reduce((s,l)=>s+l.h,0);
  const totKring=layers.filter(l=>l.type==='kring').reduce((s,l)=>s+l.h,0);
  const totRest=layers.filter(l=>l.type==='rest').reduce((s,l)=>s+l.h,0);
  const totalH=layers.reduce((s,l)=>s+l.h,0);
  const kringLayers=layers.filter(l=>l.type==='kring');
  const snitth=kringLayers.length>0?kringLayers.reduce((s,l)=>s+l.h,0)/kringLayers.length:0;

  // SVG cross-section (drawn top-down = deepest at bottom visually)
  const svgW=300,svgH=210,margin=20,trH=Math.max(totalH,0.1);
  const pxM=Math.min((svgH-30)/trH,70);
  const bwPx=Math.min((svgW-2*margin)*.5,110);
  const cx=svgW/2;
  let svgParts='',yy=10;
  // Fill bands spanning full trench width (no pipes in this loop)
  for(const l of [...layers].reverse()){
    const lh=Math.max(l.h*pxM,2);
    svgParts+=`<rect x="${(cx-bwPx/2).toFixed(1)}" y="${yy.toFixed(1)}" width="${bwPx}" height="${lh.toFixed(1)}" fill="${l.col}" opacity=".8"/>`;
    if(l.h>0.1){
      const label=l.type==='badd'?T('Bädd','Bed'):l.type==='kring'?'Kring':'Rest';
      svgParts+=`<text x="${cx}" y="${(yy+lh/2+3.5).toFixed(1)}" text-anchor="middle" font-size="9" fill="#fff" font-weight="600">${label} ${l.h.toFixed(2)}m</text>`;
    }
    yy+=lh;
  }
  // Draw pipes SIDE BY SIDE at their actual depths — evenly spaced horizontally
  const n=pipes.length||1;
  for(let pi=0;pi<pipes.length;pi++){
    const p=pipes[pi];
    const px=cx-bwPx/2+(pi+.5)/n*bwPx;   // horizontal: evenly spaced L→R
    const py=10+p.depth*pxM;               // vertical: actual depth from road
    const pR=Math.min(Math.max(p.dia/2*pxM,4),bwPx/(2*n)-2);
    svgParts+=`<circle cx="${px.toFixed(1)}" cy="${py.toFixed(1)}" r="${pR.toFixed(1)}" fill="#1e3a8a" opacity=".95" stroke="#93c5fd" stroke-width="1.5"/>`;
    svgParts+=`<text x="${px.toFixed(1)}" y="${(py+pR+10).toFixed(1)}" text-anchor="middle" font-size="8" fill="var(--ts)" font-weight="600">DN${Math.round(p.dia*1000)}</text>`;
  }
  const svgOut=`<svg width="${svgW}" height="${svgH}" style="display:block;margin:0 auto">
    <rect x="${(cx-bwPx/2).toFixed(1)}" y="8" width="${bwPx}" height="${(yy-8).toFixed(1)}" fill="none" stroke="var(--bd)" stroke-width="2" rx="1"/>
    ${svgParts}
    <line x1="${(cx-bwPx/2-12).toFixed(1)}" y1="10" x2="${(cx-bwPx/2-12).toFixed(1)}" y2="${yy.toFixed(1)}" stroke="var(--ts)" stroke-width="1" stroke-dasharray="3,2"/>
    <text x="${(cx-bwPx/2-14).toFixed(1)}" y="${(yy/2+4).toFixed(1)}" text-anchor="middle" font-size="8" fill="var(--ts)" transform="rotate(-90,${(cx-bwPx/2-14).toFixed(1)},${(yy/2).toFixed(1)})">${totalH.toFixed(2)}m</text>
    <text x="${cx}" y="${(yy+14).toFixed(1)}" text-anchor="middle" font-size="9" fill="var(--ts)">BW = ${bw}m</text>
  </svg>`;

  return`<div>
  <div class="ph"><h2>📐 VA-spec — ${T('Rör i samma schakt, olika djup','Pipes in shared trench, different depths')}</h2>
  <div class="sub">${T('Rör ligger bredvid varandra (inte ovanpå) men på olika djup. Beräknar kring- och restfyllning lager för lager.','Pipes lie side by side (not stacked) but at different depths. Calculates surround and rest fill layer by layer.')}</div></div>
  <div class="infobox"><h4>ℹ️ ${T('Beräkningsprincip','Calculation principle')}</h4>
    <p>${T('Används när rörledningar i samma schakt ligger bredvid varandra men på olika djup (t.ex. vatten och spillvatten). Rören ligger inte ovanpå varandra — de är placerade sida vid sida i schaktet men på olika nivåer. Varje rör får sin egen kringfyllningszon. Restfyllning fyller automatiskt mellanzonerna och zonen ovan det grundaste röret.','Use when pipes in the same trench lie side by side but at different depths (e.g. water and sewer). Pipes are not stacked on top of each other — they sit next to each other in the trench but at different elevations. Each pipe gets its own surround fill zone. Rest fill automatically fills the gaps between zones and above the deepest pipe.')}</p>
    <ul style="margin-top:6px">
      <li><strong>m.c.</strong> = ${T('djup till rörcentrum från vägyta','depth to pipe centreline from road surface')}</li>
      <li><strong>${T('Kring ovan kron','Surr. above crown')}</strong> = <strong>${SET.kringAMA*100} cm</strong> — ${T('AMA-standard, automatiskt för alla rör. Ändra under','AMA standard, applied automatically to all pipes. Change under')} <span class="badge-pill" onclick="go('settings')" style="cursor:pointer">⚙️ ${T('Inställningar','Settings')}</span></li>
      <li><strong>snitthöjd kringfylln</strong> = ${T('medelhöjd kringfyllning för alla rör (rördiameter + kring ovan kron)','average surround fill height across all pipes (pipe diameter + surround above crown)')}</li>
    </ul>
  </div>

  <div class="cg2">
  <div class="cd"><div class="ct"><span class="dot" style="background:var(--i)"></span>${T('Schaktkonfiguration','Trench configuration')}</div>
  <div class="fg">
    <div class="fi"><label>${T('Bottenbredd BW (m)','Bottom width BW (m)')}</label>
      <input type="number" value="${bw}" step=".05" min=".1" onchange="D('VA').spec.bw=+this.value;touchProj();save();go('vaspec')"></div>
    <div class="fi"><label>${T('Bädd djupaste rör (m)','Bedding deepest pipe (m)')}</label>
      <input type="number" value="${badd}" step=".05" min="0" onchange="D('VA').spec.badd=+this.value;touchProj();save();go('vaspec')"></div>
    <div class="fi"><label>${T('Schaktlängd (m) — från VA','Trench length (m) — from VA')}</label>
      <input type="number" value="${totalL.toFixed(1)}" readonly style="opacity:.6;cursor:default"></div>
  </div></div>
  <div class="cd"><div class="ct"><span class="dot" style="background:#06b6d4"></span>${T('Tvärsnitt','Cross-section')}</div>
  ${svgOut}</div>
  </div>

  <div class="cd"><div class="ct"><span class="dot" style="background:var(--a)"></span>${T('Rörledningar — djup och kringfyllningszoner','Pipes — depth and surround fill zones')}</div>
  <div style="padding:8px 16px;font-size:12px;color:var(--ts);border-bottom:1px solid var(--bd)">
    ${T('Kring ovan kron','Surr. above crown')}: <strong style="color:var(--i)">${SET.kringAMA*100} cm</strong> (AMA-standard) · ${T('Kringzon höjd = rördiameter + kring ovan kron','Zone height = pipe Ø + surround above crown')} · <span onclick="go('settings')" style="cursor:pointer;color:var(--a);text-decoration:underline">⚙️ ${T('Ändra i Inställningar','Change in Settings')}</span>
  </div>
  <div class="tbl-wrap"><table class="dt">
    <thead><tr>
      <th>${T('Rörnamn','Pipe name')}</th>
      <th>${T('Dim (mm)','Dim (mm)')}</th>
      <th title="${T('Djup från vägyta till rörcentrum. Rören ligger bredvid varandra på sina respektive djup.','Depth from road surface to pipe centreline. Pipes lie side by side, each at its own depth.')}">${T('Djup m.c. (m)','Depth c/l (m)')} <span style="opacity:.5">ℹ</span></th>
      <th>${T('Kringzon höjd (m)','Zone height (m)')}</th>
      <th></th>
    </tr></thead>
    <tbody>${spec.pipes.map((p,i)=>`<tr>
      <td><input type="text" value="${p.name}" onclick="event.stopPropagation()" onchange="D('VA').spec.pipes[${i}].name=this.value;touchProj();save();go('vaspec')"></td>
      <td><input type="number" value="${Math.round(p.dia*1000)}" step="1" min="20" onclick="event.stopPropagation()" onchange="D('VA').spec.pipes[${i}].dia=+this.value/1000;touchProj();save();go('vaspec')"></td>
      <td><input type="text" inputmode="decimal" value="${p.depth}" step=".1" onclick="event.stopPropagation()" onchange="D('VA').spec.pipes[${i}].depth=parseFloat(this.value.replace(',','.'))||0;touchProj();save();go('vaspec')"></td>
      <td class="num" style="font-weight:700;color:var(--i)">${(p.dia+SET.kringAMA).toFixed(3)}</td>
      <td>${spec.pipes.length>1?`<button class="bd-btn" onclick="event.stopPropagation();D('VA').spec.pipes.splice(${i},1);touchProj();save();go('vaspec')">✕</button>`:''}</td>
    </tr>`).join('')}</tbody>
  </table></div>
  <div class="btn-row">

function renderBudget(){
  if(!curProj())return emptyProj();
  // Migrate old projects that pre-date the Budget page
  if(!D('BUD')){
    S.projects[S.cur].data.BUD={cfg:{
      mask:[...CFG_BUD.mask.map(m=>({...m}))],arb:[...CFG_BUD.arb.map(a=>({...a}))],
      mat:0,etab:0,dep_r:65,prod:120,f_berg:5.0,
      risk:10,oh:12,vinst:8,ofor:5,rot:0,rot_pers:1,rot_max:50000
    },prices:{...PRC_GLOBAL}};
    save();
  }
  // Migrate prices from VA.prices to BUD.prices (one-time)
  if(!D('BUD').prices){
    const _vap=D('VA')?.prices;
    D('BUD').prices=_vap?{...PRC_GLOBAL,..._vap}:{...PRC_GLOBAL};
    save();
  }
  // Migrate: add geo1/2/3 if missing (old projects only had 'geo')
  if(D('BUD').prices.geo1===undefined){D('BUD').prices.geo1=D('BUD').prices.geo||30;D('BUD').prices.geo2=D('BUD').prices.geo!==undefined?D('BUD').prices.geo*2:60;D('BUD').prices.geo3=D('BUD').prices.geo!==undefined?Math.round(D('BUD').prices.geo*3.2):95;delete D('BUD').prices.geo;save();}
  // Remove legacy jord_r/berg_r from cfg if present (no longer used)
  if(D('BUD').cfg.jord_r!==undefined){delete D('BUD').cfg.jord_r;delete D('BUD').cfg.berg_r;save();}
  const cfg=D('BUD').cfg;

  // ── Auto-pull volumes from all calc types ──────────────────
  const {segs:elSegs,tot:el}=elAll(),{segs:fvSegs,tot:fv}=fvAll(),{segs:fbSegs,tot:fb}=fbAll(),{segs:trSegs,tot:tr}=trAll(),{segs:vaSegs,tot:va}=vaAll();
  const totJord = el.jord+fv.jord+fb.jord+tr.jord+va.jord;
  const totBerg = el.berg+fv.berg+fb.berg+tr.berg+va.berg;
  const totBal  = el.bal +fv.bal +fb.bal +tr.bal +va.bal;
  const overskott = Math.max(0, totBal);

  // ── Cost calculations ──────────────────────────────────────
  const pr=D('BUD').prices;
  const maskCost = cfg.mask.reduce((s,m)=>s+m.r*m.h, 0);
  const arbCost  = cfg.arb.reduce((s,a)=>s+a.r*a.h, 0);
  const depCost  = overskott * cfg.dep_r;
  const massCost = depCost;
  // Per-tab schakt costs from unit prices × volumes
  const geoP=(gt)=>(gt>0?(pr['geo'+gt]||0):0);
  const calcTab=(t,gt=0)=>(t.jord||0)*(pr.jord||0)+(t.berg||0)*(pr.berg||0)+(t.bed||0)*(pr.badd||0)+(t.sur||0)*(pr.kring||0)+((t.remA||t.rem)||0)*(pr.restA||0)+(t.aa||0)*(pr.asfalt||0)+(t.va||0)*(pr.veg||0)+(t.bergAvt||0)*(pr.avtatn||0)+(t.sp||0)*(pr.spont||0)+(t.geo||0)*geoP(gt);
  const elGt=D('EL')?.cfg?.geoType||0,fvGt=D('FV')?.cfg?.geoType||0,fbGt=D('FB')?.cfg?.geoType||0,trGt=D('TR')?.cfg?.geoType||0;
  const elCost=calcTab(el,elGt),fvCost=calcTab(fv,fvGt),fbCost=calcTab(fb,fbGt),trCost=calcTab(tr,trGt),vaCost=va.cost;
  const schaktTotal=elCost+fvCost+fbCost+trCost+vaCost;
  const direktCost = maskCost + arbCost + cfg.mat + cfg.etab + massCost + schaktTotal;

  // ── Påslag ─────────────────────────────────────────────────
  const riskAmt  = direktCost * cfg.risk / 100;
  const ohAmt    = direktCost * cfg.oh   / 100;
  const vinAmt   = direktCost * cfg.vinst/ 100;
  const oforAmt  = direktCost * cfg.ofor / 100;
  const pAslagTot= riskAmt + ohAmt + vinAmt + oforAmt;

  const totalExMoms  = direktCost + pAslagTot;
  const moms         = totalExMoms * 0.25;
  const totalInkMoms = totalExMoms + moms;

  // ── ROT-avdrag ─────────────────────────────────────────────
  // 30% of labour, capped at rot_max per person
  const rotPerPers = Math.min(arbCost * 0.30, cfg.rot_max);
  const rotTotal   = cfg.rot ? Math.min(rotPerPers * cfg.rot_pers, arbCost * 0.30) : 0;
  const netto      = totalInkMoms - rotTotal;

  // ── Time estimation ────────────────────────────────────────
  // Normal förhållanden: 1x → jord at prod rate
  // Losshållning berg: f_berg × (default 5.0 = +400%)
  const estH_jord  = cfg.prod > 0 ? totJord / cfg.prod : 0;
  const estH_berg  = cfg.prod > 0 ? (totBerg / cfg.prod) * cfg.f_berg : 0;
  const estH_tot   = estH_jord + estH_berg;
  const estDays    = estH_tot / 8;

  const fmtH = h => h < 1 ? '<1' : h.toFixed(0);

  // ── Mask rows ──────────────────────────────────────────────
  const maskRows = cfg.mask.map((m,i)=>`
    <div class="bud-row">
      <input value="${m.n}" onchange="D('BUD').cfg.mask[${i}].n=this.value;budSave()" style="font-size:12px;font-weight:600">
      <input type="number" value="${m.r}" step="50" placeholder="${T('kr/h','SEK/h')}" onchange="D('BUD').cfg.mask[${i}].r=+this.value;budSave()">
      <input type="number" value="${m.h}" step="1"  placeholder="${T('Timmar','Hours')}"  onchange="D('BUD').cfg.mask[${i}].h=+this.value;budSave()">
      <span class="row-total">${fmtSEK(m.r*m.h)}</span>
      <button class="bud-del" onclick="budDelMask(${i})">✕</button>
    </div>`).join('');

  const arbRows = cfg.arb.map((a,i)=>`

      <input type="number" value="${a.h}" step="1"  placeholder="${T('Timmar','Hours')}"  onchange="D('BUD').cfg.arb[${i}].h=+this.value;budSave()">
      <span class="row-total">${fmtSEK(a.r*a.h)}</span>
      <button class="bud-del" onclick="budDelArb(${i})">✕</button>
    </div>`).join('');

  const colHdr=`<div style="display:grid;grid-template-columns:1fr 100px 100px 110px auto;gap:6px;padding:0 10px 4px;font-size:9px;font-weight:700;color:var(--tm);text-transform:uppercase;letter-spacing:.4px">

      <span style="margin-left:auto;opacity:.7;font-size:11px">${T('Uppdateras automatiskt från alla schakttyper','Auto-updated from all excavation types')}</span>
    </div>
  </div>



  <!-- ══ MASKINKOSTNADER ══ -->
  <div class="cd bud-section">
    <div class="ct"><span class="dot" style="background:var(--p)"></span>${T('Maskinkostnader','Machine costs')} <span style="margin-left:auto;font-weight:800;font-size:12px;color:var(--p)">${fmtSEK(maskCost)}</span></div>

  <!-- ══ SAMMANFATTNING ══ -->

      {label:T('Bergschakt','Rock exc.'),data:[el.berg,fv.berg,fb.berg,tr.berg,va.berg],backgroundColor:'#a78bfa',borderRadius:4},

    ]);
    mkPie('ch-dash-pie',[T('Jordschakt','Soil'),T('Bergschakt','Rock'),T('Bädd','Bed'),T('Kring','Surr.')],[el.jord+fv.jord+fb.jord+tr.jord+va.jord,el.berg+fv.berg+fb.berg+tr.berg+va.berg,el.bed+fv.bed+fb.bed+tr.bed+va.bed,el.sur+fv.sur+fb.sur+tr.sur+va.sur]);
  }else if(p==='el'){
    const{segs,tot}=elAll();

    if(segs.length){
      mkLine('ch-el-depth',segs.map(s=>`${s.f}-${s.t}m`),[{label:T('Medeldjup (m)','Avg depth (m)'),data:segs.map(s=>s.ad),borderColor:'#6366f1',fill:true,backgroundColor:'rgba(99,102,241,.08)',tension:.3,pointRadius:4}]);
      mkBar('ch-el-seg',segs.map(s=>`${s.f}-${s.t}`),[
        {label:T('Jord','Soil'),data:segs.map(s=>s.jord),backgroundColor:'#818cf8',borderRadius:4},
        {label:T('Berg','Rock'),data:segs.map(s=>s.berg),backgroundColor:'#a78bfa',borderRadius:4},
        {label:T('Bädd','Bed'),data:segs.map(s=>s.bed),backgroundColor:'#f59e0b',borderRadius:4}
      ]);
    }
  }else if(p==='fv'){
    const{segs,tot}=fvAll();
    mkPie('ch-fv-pie',[T('Jord','Soil'),T('Berg','Rock'),T('Bädd','Bed'),T('Kring','Surr'),T('Rest','Rest')],[tot.jord,tot.berg,tot.bed,tot.sur,tot.rem],['#818cf8','#a78bfa','#f59e0b','#06b6d4','#10b981']);
    if(segs.length){
      mkLine('ch-fv-depth',segs.map(s=>`${s.f}m`),[{label:T('Djup','Depth'),data:segs.map(s=>s.ad),borderColor:'#ef4444',fill:true,backgroundColor:'rgba(239,68,68,.07)',tension:.3,pointRadius:3}]);
      mkBar('ch-fv-seg',segs.map(s=>`${s.f}-${s.t}`),[
        {label:T('Jord','Soil'),data:segs.map(s=>s.jord),backgroundColor:'#818cf8',borderRadius:3},
        {label:T('Kring','Surr.'),data:segs.map(s=>s.sur),backgroundColor:'#06b6d4',borderRadius:3},
        {label:T('Bädd','Bed'),data:segs.map(s=>s.bed),backgroundColor:'#f59e0b',borderRadius:3}
      ]);

    if(segs.length){
      mkLine('ch-fb-depth',segs.map(s=>`${s.f}m`),[{label:T('Djup','Depth'),data:segs.map(s=>s.ad),borderColor:'#f97316',fill:true,backgroundColor:'rgba(249,115,22,.07)',tension:.3,pointRadius:3}]);
      mkBar('ch-fb-seg',segs.map(s=>`${s.f}-${s.t}`),[

      mkLine('ch-tr-depth',segs.map(s=>`${s.f}m`),[{label:T('Djup','Depth'),data:segs.map(s=>s.ad),borderColor:'#06b6d4',fill:true,backgroundColor:'rgba(6,182,212,.08)',tension:.3,pointRadius:3}]);

  }else if(p==='rl'){
    const RL=D('RL');
    const vTotals=RL.vatten.pipes.map((_,pi)=>RL.vatten.sections.reduce((s,sec)=>s+(sec.counts[pi]||0)*sec.len,0));
    const dTotals=RL.avlopp.dagPipes.map((_,pi)=>RL.avlopp.dagSections.reduce((s,sec)=>s+(sec.dag[pi]||0)*sec.len,0));
    const sTotals=RL.avlopp.spillPipes.map((_,pi)=>RL.avlopp.dagSections.reduce((s,sec)=>s+(sec.spill[pi]||0)*sec.len,0));
    mkPie('ch-rl-type',[T('Vatten','Water'),T('Dag-avlopp','Storm w.'),T('Spillvatten','Sewage')],[vTotals.reduce((a,b)=>a+b,0),dTotals.reduce((a,b)=>a+b,0),sTotals.reduce((a,b)=>a+b,0)],['#6366f1','#10b981','#8b5cf6']);
    const vNZ=RL.vatten.pipes.filter((_,i)=>vTotals[i]>0),vV=vTotals.filter(v=>v>0);
    if(vNZ.length)mkPie('ch-rl-vdim',vNZ,vV);
  }else if(p==='sm'){
    const el=elAll().tot,fv=fvAll().tot,fb=fbAll().tot,tr=trAll().tot,va=vaAll().tot;
    mkBar('ch-sm-bar',['EL kanalisation','Fjärrvärme','Fyllnad','Trumma','Vatten & Avlopp'],[
      {label:T('Jord','Soil'),data:[el.jord,fv.jord,fb.jord,tr.jord,va.jord],backgroundColor:'#818cf8',borderRadius:4},
      {label:T('Berg','Rock'),data:[el.berg,fv.berg,fb.berg,tr.berg,va.berg],backgroundColor:'#a78bfa',borderRadius:4},
      {label:T('Bädd','Bed'),data:[el.bed,fv.bed,fb.bed,tr.bed,va.bed],backgroundColor:'#f59e0b',borderRadius:4},
      {label:T('Kring','Surr.'),data:[el.sur,fv.sur,fb.sur,tr.sur,va.sur],backgroundColor:'#06b6d4',borderRadius:4}
    ]);
    const totJ=el.jord+fv.jord+fb.jord+tr.jord+va.jord,totB=el.berg+fv.berg+fb.berg+tr.berg+va.berg,totBed=el.bed+fv.bed+fb.bed+tr.bed+va.bed,totS=el.sur+fv.sur+fb.sur+tr.sur+va.sur;
    mkPie('ch-sm-pie',[T('Jordschakt','Soil exc.'),T('Bergschakt','Rock exc.'),T('Bädd','Bedding'),T('Kringfyllning','Surr.fill')],[totJ,totB,totBed,totS]);
  }
}

function dl(name,content,mime){const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([content],{type:mime}));a.download=name;a.click();}
function saveLocal(){save();toast('💾 '+T('Data sparad!','Data saved!'));}
function xCSV(){
  if(!curProj())return;
  const el=elAll().tot,fv=fvAll().tot,fb=fbAll().tot,tr=trAll().tot,va=vaAll().tot;
  let c=`${T('Projekt','Project')}: ${curProj().name}\n`;
  c+='Typ,Längd,Schakt m³,Jord m³,Berg m³,Bädd m³,Kring m³,Rest m³,Geo m²\n';
  [[' EL kanalisation',el],[' Fjärrvärme',fv],[' Fyllnad',fb],[' Trumma',tr],[' Vatten & Avlopp',va]].forEach(([n,t])=>{
    c+=`${n},${t.l?.toFixed(1)||0},${t.exc.toFixed(2)},${t.jord.toFixed(2)},${t.berg.toFixed(2)},${t.bed.toFixed(2)},${t.sur.toFixed(2)},${(t.remA||t.rem||0).toFixed(2)},${t.geo.toFixed(2)}\n`;
  });
  dl(`${curProj().name}-kalkyl.csv`,c,'text/csv');toast('📄 CSV exporterat');
}
function xJSON(){
  if(!curProj())return;
  dl(`${curProj().name}-kalkyl.json`,JSON.stringify({project:curProj(),totals:{EL:elAll(),FV:fvAll(),FB:fbAll(),TR:trAll(),VA:vaAll()},exported:new Date().toISOString()},null,2),'application/json');
  toast('{ } JSON exporterat');
}
function xPDF(){

  const el=elAll().tot,fv=fvAll().tot,va=vaAll().tot,proj=curProj();
  const w=window.open('');
  w.document.write(`<!DOCTYPE html><html><head><meta charset="UTF-8"><title>AMA/MER – ${proj.name}</title>
  <style>body{font-family:Arial,sans-serif;margin:30px;font-size:12px;color:#0f172a}h1{color:#4f46e5;margin-bottom:4px}
  .sub{color:#64748b;font-size:11px;margin-bottom:20px}table{border-collapse:collapse;width:100%;margin:12px 0}
  th{background:#4f46e5;color:#fff;padding:7px;text-align:left}td{padding:5px;border-bottom:1px solid #e2e8f0}
  tfoot td{font-weight:700;background:#f1f5f9}.m{display:inline-block;border:1px solid #e2e8f0;border-radius:8px;padding:10px 14px;margin:4px;text-align:center;min-width:100px}
  .v{font-size:20px;font-weight:800;color:#4f46e5}.l{font-size:9px;color:#64748b;text-transform:uppercase}</style></head>
  <body><h1>⛏️ AMA/MER Kalkylrapport</h1>
  <div class="sub">${proj.name} · ${proj.desc||''} · Genererad: ${new Date().toLocaleDateString('sv-SE')} · AMA/MER Kalkyl Pro v6</div>
  <div class="m"><div class="v">${(el.exc+fv.exc+va.exc).toFixed(0)}</div><div class="l">Total schakt m³</div></div>
  <div class="m"><div class="v">${(el.jord+fv.jord+va.jord).toFixed(0)}</div><div class="l">Jordschakt m³</div></div>
  <table><tr><th>Typ</th><th>Längd</th><th>Schakt m³</th><th>Jord m³</th><th>Berg m³</th><th>Bädd m³</th><th>Kring m³</th></tr>
  ${[['EL kanalisation',el],['Fjärrvärme',fv],['Vatten & Avlopp',va]].map(([n,t])=>`<tr><td>${n}</td><td>${t.l?.toFixed(1)||0}m</td><td>${t.exc.toFixed(1)}</td><td>${t.jord.toFixed(1)}</td><td>${t.berg.toFixed(1)}</td><td>${t.bed.toFixed(1)}</td><td>${t.sur.toFixed(1)}</td></tr>`).join('')}
  </table>
  <p style="color:#94a3b8;margin-top:20px;font-size:10px">Tryck Ctrl+P för att spara som PDF · AMA/MER Kalkyl Pro v6</p>
  </body></html>`);
  w.document.close();toast('📕 Utskrift öppnad');
}
